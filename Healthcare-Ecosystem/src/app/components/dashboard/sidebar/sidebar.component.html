<aside class="sidebar">

  <!-- Logo -->
  <div class="logo-section">
    <img
      src="assets/images/logo.jpg"
      alt="Logo"
      class="logo"
    />
  </div>

  <!-- Menu -->
  <nav class="nav-menu">

    <a
      class="nav-item"
      [class.active]="activeItem === 'dashboard'"
      (click)="onDashboard()"
    >
      <i class="fas fa-home"></i>
      Dashboard
    </a>

    <a
      class="nav-item"
      [class.active]="activeItem === 'booking'"
      (click)="onBooking()"
    >
      <i class="fas fa-calendar-alt"></i>
      Booking
    </a>

    <a
      class="nav-item"
      [class.active]="activeItem === 'doctor'"
      (click)="onDoctor()"
    >
      <i class="fas fa-user-md"></i>
      Doctor
    </a>

    <a
      class="nav-item"
      [class.active]="activeItem === 'record'"
      (click)="onRecord()"
    >
      <i class="fas fa-file-medical"></i>
      Record
    </a>

    <a
      class="nav-item"
      [class.active]="activeItem === 'payment'"
      (click)="onPayment()"
    >
      <i class="fas fa-credit-card"></i>
      Payment
    </a>

  </nav>

</aside>
