<div class="login-page">
  <div class="login-card shadow-lg">

    <div class="card-header-custom text-center py-2">
      Gateway To Seamless Healthcare Ecosystem
    </div>

    <div class="card-body-custom d-flex align-items-center">
      <div class="container-fluid">
        <div class="row">

          <div class="col-md-5"></div>

          <div class="col-md-6 ms-auto pe-5">
            <div class="login-form-box">
              <form>

                <div class="row mb-3 align-items-center">
                  <label class="col-sm-4 fw-bold text-dark">User Name</label>
                  <div class="col-sm-8">
                    <input type="text" class="form-control custom-input"
                      [(ngModel)]="loginObj.username"
                      name="username"
                      placeholder="Enter User Name">
                  </div>
                </div>

                <div class="row mb-4 align-items-center">
                  <label class="col-sm-4 fw-bold text-dark">Email</label>
                  <div class="col-sm-8">
                    <input type="text" class="form-control custom-input"
                      [(ngModel)]="loginObj.email"
                      name="Email"
                      placeholder="Enter Email">
                  </div>
                </div>

                <div class="row">
                  <div class="col-sm-8 offset-sm-4">
                    <button type="button" class="btn btn-login w-100"
                      (click)="onLogin()">Login</button>
                  </div>
                </div>

              </form>
            </div>
          </div>

        </div>
      </div>
    </div>

  </div>
</div>
